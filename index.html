<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentForge AI | Job Board & Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-sans min-h-screen antialiased selection:bg-blue-500/30">

    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // Screen Routing States
            const [view, setView] = React.useState('login'); // login | signup | dashboard
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [authError, setAuthError] = React.useState('');

            // App Operational States
            const [jobs, setJobs] = React.useState([]);
            const [selectedJob, setSelectedJob] = React.useState(null);
            const [file, setFile] = React.useState(null);
            const [loading, setLoading] = React.useState(false);
            const [analysisResult, setAnalysisResult] = React.useState(null);

            // Fetch Job database entries on startup
            React.useEffect(() => {
                if (view === 'dashboard') {
                    fetch('http://127.0.0.1:8000/api/jobs')
                        .then(res => res.json())
                        .then(data => {
                            setJobs(data);
                            if(data.length > 0) setSelectedJob(data[0]);
                        })
                        .catch(() => alert("Error communicating with data servers. Ensure main.py is active."));
                }
            }, [view]);

            const handleAuth = (type) => {
                if (!username || !password) {
                    setAuthError("All credentials fields must be completed.");
                    return;
                }
                if (type === 'login' && username === 'developer' && password === 'pass123') {
                    setView('dashboard');
                    setAuthError('');
                } else if (type === 'signup') {
                    alert("Account provisioned successfully! Signing you in automatically.");
                    setView('dashboard');
                    setAuthError('');
                } else {
                    setAuthError("Invalid credentials profiles. Access Denied. (Try: developer / pass123)");
                }
            };

            const executeAnalysis = async (e) => {
                e.preventDefault();
                if (!file) {
                    alert("Please provide a text-based PDF Resume document first.");
                    return;
                }
                setLoading(true);
                setAnalysisResult(null);

                const formData = new FormData();
                formData.append('job_id', selectedJob.id);
                formData.append('file', file);

                try {
                    const response = await fetch('http://127.0.0.1:8000/api/analyze', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    setAnalysisResult(data);
                } catch {
                    alert("Error processing the AI analysis execution.");
                } finally {
                    setLoading(false);
                }
            };

            // 🛑 VIEW CONTAINER: Login Screen
            if (view === 'login') {
                return (
                    <div class="min-h-screen w-full flex items-center justify-center relative overflow-hidden bg-[#0b0f19] px-4">
                        <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] rounded-full bg-blue-500/10 blur-[130px] pointer-events-none"></div>
                        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-emerald-500/10 blur-[130px] pointer-events-none"></div>
                        
                        <div class="relative z-10 bg-slate-900/40 backdrop-blur-xl border border-slate-800/80 p-8 rounded-2xl shadow-[0_0_50px_-12px_rgba(0,0,0,0.8)] w-full max-w-md transform transition-all duration-300 hover:border-slate-700/60">
                            <div class="text-center mb-8">
                                <div class="inline-flex bg-gradient-to-tr from-blue-500/20 to-emerald-400/20 border border-blue-500/30 p-2 rounded-xl mb-3 shadow-inner">
                                    <span class="text-xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent px-1">TF</span>
                                </div>
                                <h2 class="text-3xl font-black bg-gradient-to-r from-blue-400 via-indigo-200 to-emerald-400 bg-clip-text text-transparent tracking-tight">Welcome Back</h2>
                                <p class="text-slate-400 text-xs mt-1.5">Accelerate Your Match Potential via Advanced Deep-Learning</p>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">Username</label>
                                    <input type="text" placeholder="Enter developer" value={username} onChange={e => setUsername(e.target.value)} class="w-full bg-slate-950/50 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 transition-all text-slate-100 placeholder-slate-600" />
                                </div>
                                <div>
                                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                                    <input type="password" placeholder="Enter pass123" value={password} onChange={e => setPassword(e.target.value)} class="w-full bg-slate-950/50 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/20 transition-all text-slate-100 placeholder-slate-600" />
                                </div>
                                
                                {authError && <p class="text-xs text-rose-400 bg-rose-500/10 p-2.5 border border-rose-500/20 rounded-xl text-center font-medium animate-pulse">{authError}</p>}
                                
                                <button onClick={() => handleAuth('login')} class="w-full bg-gradient-to-r from-blue-500 via-indigo-500 to-blue-600 hover:opacity-95 font-bold p-3 rounded-xl transition-all shadow-lg shadow-blue-500/10 transform active:scale-[0.98] text-sm tracking-wide mt-2">Sign In</button>
                                
                                <p class="text-center text-xs text-slate-400 pt-2">Don't have an account? <span onClick={() => {setView('signup'); setAuthError('');}} class="text-blue-400 hover:text-blue-300 font-medium hover:underline cursor-pointer transition-colors">Register Free</span></p>
                            </div>
                        </div>
                    </div>
                );
            }

            // 🛑 VIEW CONTAINER: Sign Up Screen
            if (view === 'signup') {
                return (
                    <div class="min-h-screen w-full flex items-center justify-center relative overflow-hidden bg-[#0b0f19] px-4">
                        <div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-emerald-500/10 blur-[130px] pointer-events-none"></div>
                        <div class="absolute bottom-[-10%] left-[-10%] w-[600px] h-[600px] rounded-full bg-blue-500/10 blur-[130px] pointer-events-none"></div>
                        
                        <div class="relative z-10 bg-slate-900/40 backdrop-blur-xl border border-slate-800/80 p-8 rounded-2xl shadow-[0_0_50px_-12px_rgba(0,0,0,0.8)] w-full max-w-md transform transition-all duration-300 hover:border-slate-700/60">
                            <div class="text-center mb-8">
                                <div class="inline-flex bg-gradient-to-tr from-emerald-500/20 to-blue-500/20 border border-emerald-500/30 p-2 rounded-xl mb-3 shadow-inner">
                                    <span class="text-xl font-black bg-gradient-to-r from-emerald-400 to-blue-400 bg-clip-text text-transparent px-1">TF</span>
                                </div>
                                <h2 class="text-3xl font-black bg-gradient-to-r from-emerald-400 via-teal-100 to-blue-400 bg-clip-text text-transparent tracking-tight">Create Free Account</h2>
                                <p class="text-slate-400 text-xs mt-1.5">Unlock semantic career analytics profiles</p>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">Full Name</label>
                                    <input type="text" placeholder="John Doe" class="w-full bg-slate-950/50 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all text-slate-100 placeholder-slate-700" />
                                </div>
                                <div>
                                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">Username</label>
                                    <input type="text" placeholder="Choose a username" value={username} onChange={e => setUsername(e.target.value)} class="w-full bg-slate-950/50 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all text-slate-100 placeholder-slate-700" />
                                </div>
                                <div>
                                    <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                                    <input type="password" placeholder="Create a password" value={password} onChange={e => setPassword(e.target.value)} class="w-full bg-slate-950/50 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500/20 transition-all text-slate-100 placeholder-slate-700" />
                                </div>
                                <button onClick={() => handleAuth('signup')} class="w-full bg-gradient-to-r from-emerald-500 via-teal-500 to-blue-500 hover:opacity-95 font-bold p-3 rounded-xl transition-all shadow-lg shadow-emerald-500/10 transform active:scale-[0.98] text-sm tracking-wide mt-2">Create Account</button>
                                <p class="text-center text-xs text-slate-400 pt-2">Already registered? <span onClick={() => {setView('login'); setAuthError('');}} class="text-emerald-400 hover:text-emerald-300 font-medium hover:underline cursor-pointer transition-colors">Log In</span></p>
                            </div>
                        </div>
                    </div>
                );
            }

            // 🎉 VIEW CONTAINER: Main Dashboard
            return (
                <div class="min-h-screen flex flex-col bg-[#0b0f19]">
                    <nav class="border-b border-slate-800/80 bg-slate-900/40 backdrop-blur-md px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                        <div class="flex items-center space-x-3">
                            <div class="bg-gradient-to-tr from-blue-500 to-emerald-400 h-8 w-8 rounded-lg flex items-center justify-center font-black text-slate-900 text-lg shadow-inner">TF</div>
                            <span class="text-xl font-bold tracking-tight text-white">TalentForge <span class="text-xs bg-blue-500/20 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded-full ml-1 font-medium">Dashboard</span></span>
                        </div>
                        <button onClick={() => {setView('login'); setAnalysisResult(null); setFile(null); setUsername(''); setPassword('');}} class="text-xs font-semibold text-slate-400 hover:text-white transition-colors bg-slate-800/50 border border-slate-700/50 px-4 py-2 rounded-xl">Sign Out 🚪</button>
                    </nav>

                    <main class="flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div class="lg:col-span-5 space-y-4 max-h-[82vh] overflow-y-auto pr-2">
                            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Available System Vacancies</h3>
                            {jobs.map((job) => (
                                <div 
                                    key={job.id} 
                                    onClick={() => { setSelectedJob(job); setAnalysisResult(null); setFile(null); }}
                                    class={`p-5 rounded-2xl border transition-all cursor-pointer transform hover:-translate-y-0.5 shadow-lg ${selectedJob?.id === job.id ? 'bg-gradient-to-br from-slate-800/40 to-slate-900/60 border-blue-500/80 shadow-blue-500/5' : 'bg-slate-900/20 border-slate-800/60 hover:bg-slate-800/30'}`}
                                >
                                    <div class="flex justify-between items-start">
                                        <span class={`text-[10px] font-bold px-2 py-0.5 rounded-full ${job.type === 'Internship' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20' : 'bg-purple-500/10 text-purple-400 border border-purple-500/20'}`}>{job.type}</span>
                                        <span class="text-xs text-slate-500 font-medium">{job.location}</span>
                                    </div>
                                    <h4 class="text-base font-bold text-slate-100 mt-2 tracking-tight">{job.title}</h4>
                                    <p class="text-xs text-slate-400 font-medium mt-1">{job.company}</p>
                                </div>
                            ))}
                        </div>

                        <div class="lg:col-span-7 bg-slate-900/10 border border-slate-800/80 rounded-3xl p-6 shadow-2xl flex flex-col relative overflow-hidden">
                            <div class="absolute top-[-20%] right-[-20%] w-[300px] h-[300px] rounded-full bg-indigo-500/5 blur-[80px] pointer-events-none"></div>
                            
                            {selectedJob && (
                                <div class="space-y-6 flex-1 flex flex-col relative z-10">
                                    <div>
                                        <h2 class="text-2xl font-black text-white tracking-tight">{selectedJob.title}</h2>
                                        <p class="text-sm font-semibold text-blue-400 mt-0.5">{selectedJob.company} • <span class="text-slate-400 font-normal">{selectedJob.location}</span></p>
                                        <div class="mt-4 p-4 bg-slate-950/40 rounded-xl border border-slate-800/60 text-xs leading-relaxed text-slate-300">
                                            <p class="font-bold text-slate-400 mb-1">Target Description Requirements Spec:</p>
                                            {selectedJob.description}
                                        </div>
                                    </div>

                                    <div class="border-t border-slate-800/60 pt-6">
                                        <form onSubmit={executeAnalysis} class="space-y-4">
                                            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400">Scan & Cross-Match Profile Resume</label>
                                            <div class="flex items-center space-x-4">
                                                <input type="file" accept=".pdf" onChange={e => setFile(e.target.files[0])} class="text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-600/20 file:text-blue-400 hover:file:bg-blue-600/30 cursor-pointer bg-slate-950/40 p-2 rounded-xl border border-slate-800/60 flex-1" />
                                                <button type="submit" disabled={loading} class="bg-gradient-to-r from-blue-500 to-indigo-500 hover:opacity-90 text-white font-bold px-6 py-3 rounded-xl transition-all text-xs tracking-wide shadow-md disabled:opacity-50">
                                                    {loading ? 'Evaluating Vectors...' : 'Run Alignment Engine'}
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    <div class="flex-1 flex flex-col justify-center border-t border-slate-800/60 pt-6 mt-4">
                                        {loading && (
                                            <div class="text-center py-8 space-y-3">
                                                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-400 mx-auto"></div>
                                                <p class="text-xs text-slate-400 font-medium">Loading SBERT models and validating semantic thresholds...</p>
                                            </div>
                                        )}

                                        {!analysisResult && !loading && (
                                            <div class="text-center text-slate-500 py-12 border border-dashed border-slate-800/80 rounded-2xl">
                                                <p class="text-sm font-medium">No Optimization Analysis Data Compiled Yet</p>
                                                <p class="text-[11px] mt-0.5">Upload your resume to calculate your contextual alignment scores</p>
                                            </div>
                                        )}

                                        {analysisResult && (
                                            <div class="bg-slate-950/30 border border-slate-800 p-5 rounded-2xl space-y-5">
                                                <div class="flex items-center justify-between">
                                                    <div>
                                                        <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400">Match Alignment Score</h4>
                                                        <div class={`text-5xl font-black mt-1 ${analysisResult.eligible ? 'text-emerald-400' : 'text-rose-500'}`}>{analysisResult.match_percentage}%</div>
                                                    </div>
                                                    <div>
                                                        {analysisResult.eligible ? (
                                                            <a href={analysisResult.application_link} target="_blank" rel="noreferrer" class="bg-gradient-to-r from-emerald-500 to-teal-500 hover:opacity-90 text-slate-900 font-extrabold px-6 py-3 rounded-xl transition-all text-xs tracking-wider inline-block shadow-lg shadow-emerald-500/10">APPLY VIA EXTERNAL BOARD 🚀</a>
                                                        ) : (
                                                            <button disabled class="bg-slate-900 border border-slate-800 text-slate-600 font-bold px-6 py-3 rounded-xl text-xs tracking-wider uppercase cursor-not-allowed">Application Locked 🔒</button>
                                                        )}
                                                    </div>
                                                </div>

                                                {!analysisResult.eligible && analysisResult.missing_keywords.length > 0 && (
                                                    <div class="border-t border-slate-800/80 pt-4 space-y-2">
                                                        <p class="text-xs font-bold text-rose-400">🛑 Deficient Skill Identifiers (Missing in Resume):</p>
                                                        <div class="flex flex-wrap gap-1.5">
                                                            {analysisResult.missing_keywords.map((kw, i) => (
                                                                <span key={i} class="bg-rose-500/10 text-rose-400 border border-rose-500/20 px-2.5 py-1 rounded-lg text-[11px] font-bold uppercase">{kw}</span>
                                                            ))}
                                                        </div>
                                                        
                                                        <div class="border-t border-slate-800/80 pt-4 space-y-2">
                                                            <p class="text-xs font-bold text-slate-300">💡 Custom AI Copy-Paste Achievement Enhancements:</p>
                                                            <div class="space-y-2 max-h-[16vh] overflow-y-auto pr-1">
                                                                {analysisResult.ai_suggestions.map((item, i) => (
                                                                    <p key={i} class="text-[11px] text-slate-400 bg-slate-950/60 p-2 rounded-lg border border-slate-800/60 leading-relaxed">{item}</p>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {analysisResult.eligible && (
                                                    <div class="bg-emerald-500/10 border border-emerald-500/20 p-3 rounded-xl text-xs text-emerald-400 font-medium text-center">🎉 Match requirement verified! You have cleared automated screening limits for this vacancy.</div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
